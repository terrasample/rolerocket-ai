<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <h1>Interview Prep</h1>
    <p>Generate likely interview questions, answer themes, and smart questions to ask the interviewer for your target role.</p>
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
  </div>
  <div class="card premium-interview-card" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:40px auto 32px auto;box-shadow:0 8px 32px #0ea5e950;">
    <label for="interviewRole" style="font-size:1.1em;"><strong>Role Title</strong></label>
    <input id="interviewRole" type="text" class="premium-input" placeholder="e.g. Product Manager" />
    <label for="interviewJobDescription" style="font-size:1.1em;"><strong>Job Description (optional)</strong></label>
    <textarea id="interviewJobDescription" rows="5" class="premium-input" placeholder="Paste the job description here..."></textarea>
    <div class="tool-action-bar">
      <div class="tool-primary-actions">
        <button id="interviewPrepBtn" class="auth-submit-btn premium-btn tool-action-btn tool-action-btn--primary" type="button">Generate Questions</button>
      </div>
      <div class="tool-secondary-actions">
        <button id="saveInterviewPrepPdfBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as PDF</button>
        <button id="saveInterviewPrepWordBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as Word</button>
      </div>
    </div>
    <div id="interviewPrepResult" class="premium-result" style="margin-top:24px;min-height:120px;"></div>

    <section class="communication-sprint" aria-label="Communication sprint" style="margin-top:18px;">
      <div class="sprint-header-row">
        <h2 class="sprint-title">RoleRocket Presence Lab</h2>
        <span id="sprintStatusPill" class="sprint-status-pill">0/14 complete</span>
      </div>
      <p class="sprint-subtitle">Role-specific speaking drills with guided narration, timed practice rounds, and progress tracking.</p>

      <div class="sprint-controls-grid">
        <label for="sprintLessonSelect"><strong>Lesson</strong></label>
        <select id="sprintLessonSelect" class="premium-input" style="margin-bottom:0;"></select>

        <label for="sprintVoiceSelect"><strong>Narration Voice</strong></label>
        <select id="sprintVoiceSelect" class="premium-input" style="margin-bottom:0;"></select>

        <label for="sprintRate"><strong>Voice Speed</strong> <span id="sprintRateValue">0.94x</span></label>
        <input id="sprintRate" type="range" min="0.8" max="1.1" value="0.94" step="0.01" />
      </div>

      <div class="sprint-actions" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button id="sprintPlayBtn" type="button" class="auth-submit-btn premium-btn tool-action-btn tool-action-btn--primary">Play Guided Voice</button>
        <button id="sprintStopBtn" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary">Stop</button>
        <button id="sprintDoneBtn" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary">Mark Lesson Complete</button>
        <button id="sprintResetBtn" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary">Reset Sprint</button>
      </div>
      <div id="sprintSessionMeta" style="margin-top:10px;color:#075985;font-weight:700;"></div>

      <label for="sprintLessonNotes" style="display:block;margin-top:12px;"><strong>Lesson Notes</strong></label>
      <textarea id="sprintLessonNotes" rows="3" class="premium-input" style="margin-bottom:8px;" placeholder="Capture your practice notes and examples for this lesson..."></textarea>

      <div id="sprintTranscript" class="sprint-transcript" aria-live="polite"></div>

      <details style="margin-top:10px;">
        <summary style="cursor:pointer;font-weight:700;color:#0f172a;">Audio Fallback</summary>
        <audio controls preload="metadata" style="width:100%;margin-top:8px;">
          <source src="assets/audio/rolerocket-presence-lab-voiceover.m4a" type="audio/mp4" />
        </audio>
      </details>

      <div id="sprintProgressMeta" style="margin-top:10px;color:#0c4a6e;font-weight:600;"></div>
      <div id="sprintLessons" style="margin-top:10px;"></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/idle-timeout.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // --- Interview Prep AI Download Logic ---
    let lastInterviewPrep = '';
    // Patch dashboard.js renderAIOutput to also update lastInterviewPrep
    const origRenderAIOutput = window.renderAIOutput;
    function customRenderAIOutput(text, el) {
      lastInterviewPrep = text;
      if (typeof origRenderAIOutput === 'function') {
        origRenderAIOutput(text, el);
      } else {
        // fallback: just show plain text
        el.textContent = text;
      }
    }
    window.renderAIOutput = customRenderAIOutput;

    // PDF formatting (college plan style)
    function formatInterviewPrepForPdf(text, doc) {
      const lines = String(text || '').split(/\r?\n/);
      let y = 20;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Interview Prep', 10, y);
      y += 10;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      lines.forEach(line => {
        if (/^\*\*[^*]+\*\*$/.test(line)) {
          y += 8;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(14);
          doc.text(line.replace(/\*\*/g, ''), 10, y);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(12);
          y += 6;
        } else if (/^[-•*✦]/.test(line) || /^\d+\. /.test(line)) {
          doc.text(line.replace(/^[-•*✦]\s*/, '\u2022 ').replace(/^\d+\.\s*/, ''), 14, y);
          y += 6;
        } else if (line.trim() === '') {
          y += 4;
        } else {
          doc.text(line, 10, y);
          y += 6;
        }
        if (y > 270) { doc.addPage(); y = 20; }
      });
    }

    function formatInterviewPrepForWord(text) {
      return (
        'Interview Prep\n\n' +
        text
          .replace(/^\*\*([^*]+)\*\*$/gm, '\n\n$1\n' + '-'.repeat(30))
          .replace(/^[-•*✦]/gm, '  • ')
          .replace(/^\d+\. /gm, '  • ')
          .replace(/\n{2,}/g, '\n\n')
      );
    }

    document.getElementById('saveInterviewPrepPdfBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      if (!window.jspdf) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style=\"color:#dc2626;\">PDF library not loaded.</div>';
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      formatInterviewPrepForPdf(lastInterviewPrep, doc);
      doc.save('interview-prep.pdf');
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">PDF downloaded.</div>';
    };

    document.getElementById('saveInterviewPrepWordBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      const content = formatInterviewPrepForWord(lastInterviewPrep);
      const blob = new Blob([content], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'interview-prep.doc';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">Word document downloaded.</div>';
    };

    (function initCommunicationSprint() {
      const STORAGE_KEY = 'interview-prep:communication-sprint:v1';
      const LESSONS = [
        { id: 1, title: 'First Impression Hacks', minutes: 15, text: 'Your first thirty seconds set the frame. Open with a calm smile, grounded posture, and one clear value statement about your fit.' },
        { id: 2, title: 'Build Trust with Your Voice', minutes: 11, text: 'Slow down your first answer by ten percent. Use short sentence blocks so your points land with confidence and clarity.' },
        { id: 3, title: 'Confidence Wins', minutes: 10, text: 'Confidence sounds specific. Use evidence: what you did, why it mattered, and what result came from your action.' },
        { id: 4, title: 'Speak Up in Any Room', minutes: 10, text: 'Claim your space with concise framing. Start with the recommendation, then support it with two crisp reasons.' },
        { id: 5, title: 'Storytelling Secrets', minutes: 13, text: 'Use a short STAR pattern: situation, task, action, result. Keep each part focused and tied to the target role.' },
        { id: 6, title: 'Body Language That Supports Your Message', minutes: 15, text: 'Keep your shoulders open, chin neutral, and hands visible. Let posture reinforce your credibility, not distract from it.' },
        { id: 7, title: 'Read People Like a Pro', minutes: 15, text: 'Listen for cues in tone and pacing. Mirror interview energy lightly and adapt your depth based on the interviewer response.' },
        { id: 8, title: 'Give Tough Feedback Fast', minutes: 17, text: 'Lead with context, name the gap clearly, and end with forward action. Respectful directness builds leadership trust.' },
        { id: 9, title: 'Handle Difficult People Smartly', minutes: 13, text: 'Separate behavior from identity. Acknowledge emotion, reset on goals, and redirect to concrete next steps.' },
        { id: 10, title: 'Say No and Still Be Likable', minutes: 10, text: 'Say no to the request, not the person. Offer an alternative path so you protect priorities while preserving relationships.' },
        { id: 11, title: 'Interrupt Smoothly', minutes: 10, text: 'Use bridge phrases like, one quick thought to build on that. Keep it brief and return the floor promptly.' },
        { id: 12, title: 'Defuse Any Conflict', minutes: 15, text: 'Name the shared objective first. Then align on facts, options, and a clear owner for the next action.' },
        { id: 13, title: 'Listen Like a Leader', minutes: 11, text: 'Summarize before responding. When people feel heard, your influence rises and your answers become sharper.' },
        { id: 14, title: 'Small Talk Magic', minutes: 12, text: 'Use small talk as a bridge into relevance. Start warm, then connect naturally to role context and team outcomes.' }
      ];

      const lessonSelect = document.getElementById('sprintLessonSelect');
      const voiceSelect = document.getElementById('sprintVoiceSelect');
      const rateInput = document.getElementById('sprintRate');
      const rateValue = document.getElementById('sprintRateValue');
      const notesEl = document.getElementById('sprintLessonNotes');
      const transcriptEl = document.getElementById('sprintTranscript');
      const lessonsEl = document.getElementById('sprintLessons');
      const progressMetaEl = document.getElementById('sprintProgressMeta');
      const sessionMetaEl = document.getElementById('sprintSessionMeta');
      const statusPillEl = document.getElementById('sprintStatusPill');
      const playBtn = document.getElementById('sprintPlayBtn');
      const stopBtn = document.getElementById('sprintStopBtn');
      const doneBtn = document.getElementById('sprintDoneBtn');
      const resetBtn = document.getElementById('sprintResetBtn');
      let narrationSession = 0;
      let sessionTimerId = null;
      let sessionStartedAt = 0;
      let sessionDurationMs = 0;

      if (!lessonSelect || !voiceSelect || !rateInput || !notesEl || !transcriptEl || !lessonsEl || !progressMetaEl || !sessionMetaEl || !statusPillEl || !playBtn || !stopBtn || !doneBtn || !resetBtn) {
        return;
      }

      function formatClock(ms) {
        const totalSec = Math.max(0, Math.floor(ms / 1000));
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      }

      function clearSessionTimer() {
        if (sessionTimerId) {
          clearInterval(sessionTimerId);
          sessionTimerId = null;
        }
      }

      function startSessionTimer(lessonMinutes) {
        clearSessionTimer();
        sessionDurationMs = lessonMinutes * 60 * 1000;
        sessionStartedAt = Date.now();
        sessionMetaEl.textContent = `Practice session running: ${formatClock(0)} / ${formatClock(sessionDurationMs)}`;
        sessionTimerId = setInterval(function () {
          const elapsed = Date.now() - sessionStartedAt;
          const safeElapsed = Math.min(elapsed, sessionDurationMs);
          sessionMetaEl.textContent = `Practice session running: ${formatClock(safeElapsed)} / ${formatClock(sessionDurationMs)}`;
          if (safeElapsed >= sessionDurationMs) {
            clearSessionTimer();
            sessionMetaEl.textContent = `Session complete: ${formatClock(sessionDurationMs)}. Mark lesson complete when ready.`;
          }
        }, 1000);
      }

      function readState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          const activeLessonId = Number(parsed.activeLessonId) || 1;
          return {
            activeLessonId: LESSONS.some((l) => l.id === activeLessonId) ? activeLessonId : 1,
            completed: Array.isArray(parsed.completed) ? parsed.completed.filter((id) => LESSONS.some((l) => l.id === id)) : [],
            notes: parsed.notes && typeof parsed.notes === 'object' ? parsed.notes : {}
          };
        } catch (_err) {
          return { activeLessonId: 1, completed: [], notes: {} };
        }
      }

      function writeState(next) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }

      function getCurrentLesson() {
        const lessonId = Number(lessonSelect.value) || 1;
        return LESSONS.find((l) => l.id === lessonId) || LESSONS[0];
      }

      function render() {
        const state = readState();
        const done = new Set(state.completed);
        const countDone = done.size;
        const pct = Math.round((countDone / LESSONS.length) * 100);
        const remaining = LESSONS.filter((l) => !done.has(l.id)).reduce((sum, l) => sum + l.minutes, 0);
        const total = LESSONS.reduce((sum, l) => sum + l.minutes, 0);
        const nextLesson = LESSONS.find((l) => !done.has(l.id));

        statusPillEl.textContent = `${countDone}/${LESSONS.length} complete`;
        progressMetaEl.textContent = `Progress ${pct}% | Runtime ${total} min | Remaining ${remaining} min | Next: ${nextLesson ? `Lesson ${nextLesson.id} ${nextLesson.title}` : 'Sprint complete'}`;

        lessonSelect.innerHTML = LESSONS.map((lesson) => `<option value="${lesson.id}">Lesson ${lesson.id}: ${lesson.title} (${lesson.minutes} min)</option>`).join('');
        lessonSelect.value = String(state.activeLessonId);

        const current = getCurrentLesson();
        notesEl.value = typeof state.notes[current.id] === 'string' ? state.notes[current.id] : '';
        transcriptEl.textContent = current.text;

        lessonsEl.innerHTML = LESSONS.map((lesson) => {
          const isDone = done.has(lesson.id);
          return `
            <div class="sprint-lesson-row ${isDone ? 'is-done' : ''}">
              <div class="sprint-lesson-meta"><strong>Lesson ${lesson.id}</strong> ${lesson.title} (${lesson.minutes} min)</div>
              <button type="button" class="sprint-lesson-btn ${isDone ? 'is-done' : ''}" data-lesson-id="${lesson.id}">${isDone ? 'Completed' : 'Mark Complete'}</button>
            </div>
          `;
        }).join('');
      }

      function updateActiveLesson(id) {
        const state = readState();
        const lessonId = Number(id);
        if (!LESSONS.some((l) => l.id === lessonId)) return;
        writeState({ ...state, activeLessonId: lessonId });
        render();
      }

      function toggleComplete(id) {
        const state = readState();
        const lessonId = Number(id);
        if (!LESSONS.some((l) => l.id === lessonId)) return;
        const done = new Set(state.completed);
        if (done.has(lessonId)) done.delete(lessonId);
        else done.add(lessonId);
        writeState({ ...state, completed: Array.from(done).sort((a, b) => a - b) });
        render();
      }

      function saveNotes() {
        const state = readState();
        const current = getCurrentLesson();
        const notes = { ...state.notes, [current.id]: notesEl.value.trim() };
        writeState({ ...state, notes });
      }

      function detectVoiceProfile() {
        const ua = navigator.userAgent || '';
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isMac = /Macintosh/i.test(ua);
        const isSafari = /Safari/i.test(ua) && !/Chrome|CriOS|Edg|OPR/i.test(ua);
        const isChrome = /Chrome|CriOS/i.test(ua);
        const isEdge = /Edg/i.test(ua);

        if (isIOS && isSafari) {
          return {
            key: 'ios-safari',
            rate: 0.92,
            preferredNames: ['Samantha', 'Ava', 'Allison', 'Karen', 'Moira', 'Daniel']
          };
        }

        if (isMac && isSafari) {
          return {
            key: 'mac-safari',
            rate: 0.93,
            preferredNames: ['Ava', 'Samantha', 'Allison', 'Karen', 'Moira', 'Daniel']
          };
        }

        if (isEdge) {
          return {
            key: 'edge',
            rate: 0.95,
            preferredNames: ['Aria', 'Jenny', 'Guy', 'Sonia', 'Ryan', 'Emma']
          };
        }

        if (isChrome) {
          return {
            key: 'chrome',
            rate: 0.96,
            preferredNames: ['Google UK English Female', 'Google US English', 'Samantha', 'Ava', 'Allison', 'Daniel']
          };
        }

        return {
          key: 'default',
          rate: 0.94,
          preferredNames: ['Ava', 'Samantha', 'Allison', 'Karen', 'Moira', 'Daniel']
        };
      }

      const voiceProfile = detectVoiceProfile();
      if (Number.isFinite(voiceProfile.rate)) {
        rateInput.value = String(voiceProfile.rate);
        rateValue.textContent = `${voiceProfile.rate.toFixed(2)}x`;
      }

      function loadVoices() {
        const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
        if (!voices.length) {
          voiceSelect.innerHTML = '<option value="">Default voice</option>';
          return;
        }
        const existing = voiceSelect.value;
        const preferred = voices.filter((v) => /en-GB|en-US|en-JM/i.test(v.lang));
        const pool = preferred.length ? preferred : voices;
        const priorityNames = voiceProfile.preferredNames;
        const sorted = pool.slice().sort((a, b) => {
          const aIdx = priorityNames.findIndex((name) => new RegExp(name, 'i').test(a.name));
          const bIdx = priorityNames.findIndex((name) => new RegExp(name, 'i').test(b.name));
          const aRank = aIdx === -1 ? 99 : aIdx;
          const bRank = bIdx === -1 ? 99 : bIdx;
          if (aRank !== bRank) return aRank - bRank;
          return a.name.localeCompare(b.name);
        });

        voiceSelect.innerHTML = sorted.map((v) => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');

        if (existing && sorted.some((v) => v.name === existing)) {
          voiceSelect.value = existing;
          return;
        }

        const naturalDefault = sorted.find((v) => priorityNames.some((name) => new RegExp(name, 'i').test(v.name)));
        voiceSelect.value = naturalDefault ? naturalDefault.name : sorted[0].name;
      }

      function splitForPacedSpeech(text) {
        return String(text || '')
          .replace(/:/g, '. ')
          .split(/(?<=[.!?])\s+|,\s+|;\s+/)
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function countWords(text) {
        return String(text || '').trim().split(/\s+/).filter(Boolean).length;
      }

      function pick(arr, idx) {
        if (!Array.isArray(arr) || !arr.length) return '';
        return arr[((idx % arr.length) + arr.length) % arr.length];
      }

      function buildTimedLessonScript(lesson) {
        const wordsPerMinute = 128;
        const targetWords = Math.max(180, Math.round(lesson.minutes * wordsPerMinute));

        const openings = [
          `Welcome to RoleRocket Presence Lab. Lesson ${lesson.id}, ${lesson.title}.`,
          'Today we will train your voice, pacing, and message control for interviews.',
          'You will hear guidance, then practice, then refine your answer quality.'
        ];

        const roleFrames = [
          'Frame your answer around business value, not activity.',
          'Anchor your examples to measurable outcomes and clear ownership.',
          'Use concise language so the interviewer can follow your logic quickly.',
          'Speak as if you are already operating in the target role.'
        ];

        const drills = [
          'Practice round {n}. State your opening answer in two crisp sentences.',
          'Practice round {n}. Slow down your first sentence and stress the result.',
          'Practice round {n}. Replace vague words with one concrete metric.',
          'Practice round {n}. Keep your tone calm, steady, and intentional.',
          'Practice round {n}. End with a confident close and no filler words.',
          'Practice round {n}. Use one short story with a clear before and after.'
        ];

        const reflectionPrompts = [
          'Quick reflection. Which phrase sounded strongest and why?',
          'Quick reflection. Did your pace support clarity or create rush?',
          'Quick reflection. Did you sound decisive at the end of your response?',
          'Quick reflection. Which sentence can be tightened by five words?',
          'Quick reflection. What would make this answer more role-specific?'
        ];

        const transitions = [
          'Reset your posture, breathe in, and begin again.',
          'Pause for two beats, then deliver your next version.',
          'Keep your shoulders relaxed and project from your diaphragm.',
          'Maintain eye focus and let each point land before moving on.'
        ];

        const roleSpecific = splitForPacedSpeech(lesson.text).map((line) => `${line} Apply this directly in your next interview answer.`);

        const queue = [];
        queue.push(...openings);
        queue.push(...roleSpecific);

        let round = 1;
        let currentWords = queue.reduce((sum, line) => sum + countWords(line), 0);

        while (currentWords < targetWords) {
          const drill = pick(drills, round).replace('{n}', String(round));
          const frame = pick(roleFrames, round + lesson.id);
          const reflection = pick(reflectionPrompts, round * 2 + lesson.id);
          const transition = pick(transitions, round * 3 + lesson.id);
          const composite = `${drill} ${frame} ${transition} ${reflection}`;
          queue.push(composite);
          currentWords += countWords(composite);
          round += 1;
        }

        queue.push('Session close. Deliver one final answer with calm confidence, clear structure, and measurable impact.');
        return queue;
      }

      function speakSegment(synth, text, voice, rate, pitch, transcriptTarget) {
        return new Promise((resolve) => {
          const ut = new SpeechSynthesisUtterance(text);
          if (voice) ut.voice = voice;
          ut.rate = rate;
          ut.pitch = pitch;
          ut.onstart = function () {
            transcriptTarget.textContent = text;
          };
          ut.onend = function () {
            resolve();
          };
          ut.onerror = function () {
            resolve();
          };
          synth.speak(ut);
        });
      }

      function getSegmentProsody(index, total, baseRate) {
        const phase = total <= 1 ? 0 : index / (total - 1);
        let rate = baseRate;
        let pitch = 1.0;

        if (phase < 0.2) {
          rate -= 0.03;
          pitch += 0.01;
        } else if (phase < 0.75) {
          rate += (index % 3 === 0 ? 0.01 : -0.01);
          pitch += (index % 4 === 0 ? 0.03 : 0);
        } else {
          rate -= 0.02;
          pitch += 0.04;
        }

        return {
          rate: Math.min(1.04, Math.max(0.84, rate)),
          pitch: Math.min(1.1, Math.max(0.9, pitch))
        };
      }

      function getPreferredRuntimeMs(lesson) {
        const minMs = 60 * 1000;
        const fromMinutes = Number(lesson.minutes) > 0 ? Number(lesson.minutes) * 60 * 1000 : 0;
        if (fromMinutes >= minMs) return fromMinutes;
        return minMs;
      }

      async function playCurrentLesson() {
        const synth = window.speechSynthesis;
        if (!synth) {
          transcriptEl.textContent = 'Guided voice is not supported in this browser. Use the audio fallback player below.';
          return;
        }
        narrationSession += 1;
        const sessionId = narrationSession;
        synth.cancel();
        const lesson = getCurrentLesson();
        const voiceName = voiceSelect.value;
        const voice = synth.getVoices().find((v) => v.name === voiceName);
        const baseRate = Number(rateInput.value) || 0.94;
        const queue = buildTimedLessonScript(lesson);
        const targetRuntimeMs = getPreferredRuntimeMs(lesson);
        startSessionTimer(Math.max(1, lesson.minutes));

        for (let i = 0; i < queue.length; i += 1) {
          if (sessionId !== narrationSession) {
            clearSessionTimer();
            sessionMetaEl.textContent = 'Session stopped.';
            return;
          }

          const text = queue[i];
          const prosody = getSegmentProsody(i, queue.length, baseRate);
          await speakSegment(synth, text, voice, prosody.rate, prosody.pitch, transcriptEl);

          if (Date.now() - sessionStartedAt >= targetRuntimeMs) {
            break;
          }
        }

        if (sessionId === narrationSession) {
          clearSessionTimer();
          sessionMetaEl.textContent = `Session complete: ${formatClock(targetRuntimeMs)}. Mark lesson complete when ready.`;
          transcriptEl.textContent = lesson.text;
        }
      }

      function stopSpeech() {
        narrationSession += 1;
        clearSessionTimer();
        sessionMetaEl.textContent = 'Session stopped.';
        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
        }
      }

      lessonSelect.addEventListener('change', function () {
        updateActiveLesson(lessonSelect.value);
      });

      notesEl.addEventListener('input', saveNotes);

      rateInput.addEventListener('input', function () {
        rateValue.textContent = `${Number(rateInput.value).toFixed(2)}x`;
      });

      playBtn.addEventListener('click', playCurrentLesson);
      stopBtn.addEventListener('click', stopSpeech);
      doneBtn.addEventListener('click', function () {
        toggleComplete(lessonSelect.value);
      });

      resetBtn.addEventListener('click', function () {
        stopSpeech();
        writeState({ activeLessonId: 1, completed: [], notes: {} });
        sessionMetaEl.textContent = 'Session reset.';
        render();
      });

      lessonsEl.addEventListener('click', function (event) {
        const btn = event.target.closest('.sprint-lesson-btn');
        if (!btn) return;
        const id = btn.getAttribute('data-lesson-id');
        updateActiveLesson(id);
        toggleComplete(id);
      });

      if (window.speechSynthesis) {
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;
      } else {
        voiceSelect.innerHTML = '<option value="">Voice unavailable in this browser</option>';
      }

      render();
    })();
  </script>
  <script src="js/return-navigation.js"></script>
</body>
</html>
