<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <h1>Interview Prep</h1>
    <p>Generate likely interview questions, answer themes, and smart questions to ask the interviewer for your target role.</p>
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
  </div>
  <div class="card premium-interview-card" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:40px auto 32px auto;box-shadow:0 8px 32px #0ea5e950;">
    <label for="interviewRole" style="font-size:1.1em;"><strong>Role Title</strong></label>
    <input id="interviewRole" type="text" class="premium-input" placeholder="e.g. Product Manager" />
    <label for="interviewJobDescription" style="font-size:1.1em;"><strong>Job Description (optional)</strong></label>
    <textarea id="interviewJobDescription" rows="5" class="premium-input" placeholder="Paste the job description here..."></textarea>
    <div class="tool-action-bar">
      <div class="tool-primary-actions">
        <button id="interviewPrepBtn" class="auth-submit-btn premium-btn tool-action-btn tool-action-btn--primary" type="button">Generate Questions</button>
      </div>
      <div class="tool-secondary-actions">
        <button id="saveInterviewPrepPdfBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as PDF</button>
        <button id="saveInterviewPrepWordBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as Word</button>
      </div>
    </div>
    <div id="interviewPrepResult" class="premium-result" style="margin-top:24px;min-height:120px;"></div>

  </div>
  <style>
    .premium-interview-card {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      border: 2px solid #0ea5e9;
      border-radius: 22px;
      box-shadow: 0 12px 40px #0ea5e930;
      padding: 32px 28px 28px 28px;
      width: min(1120px, calc(100vw - 64px));
    }
    .premium-input {
      font-size: 1.13em;
      border: 1.5px solid #bae6fd;
      background: #f0f9ff;
      margin-bottom: 16px;
      border-radius: 12px;
      padding: 12px 14px;
      color: #0c4a6e;
      font-family: var(--font-body);
    }
    .premium-btn {
      font-size: 1.15em;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: 0 4px 18px #0ea5e930;
      background: linear-gradient(90deg, #0ea5e9 0%, #0284c7 100%);
      transition: box-shadow 0.18s, filter 0.18s;
    }
    .premium-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 8px 32px #0ea5e950;
    }
    .premium-result {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px #0ea5e91a;
      padding: 24px 18px 18px 18px;
      border: 1.5px solid #bae6fd;
      font-size: 1.13em;
      color: #0c4a6e;
      min-height: 120px;
    }
    .premium-result .ai-question {
      background: linear-gradient(90deg, #e0f2fe 0%, #f8fafc 100%);
      border-left: 4px solid #0ea5e9;
      border-radius: 12px;
      margin-bottom: 18px;
      padding: 16px 16px 10px 18px;
      font-size: 1.12em;
      font-weight: 700;
      color: #0c4a6e;
      box-shadow: 0 2px 10px #0ea5e91a;
    }
    .premium-result .ai-theme {
      background: #f0f9ff;
      border-radius: 10px;
      margin-bottom: 14px;
      padding: 10px 14px;
      font-size: 1em;
      color: #0369a1;
      border-left: 3px solid #bae6fd;
    }
    .premium-result .ai-output-header {
      background: #f8fbff;
      border-bottom: 1px solid #dbeafe;
    }
    .premium-result .ai-output-label {
      color: #38bdf8;
    }
    .premium-result .ai-copy-output-btn {
      background: #ecfeff;
      border-color: #bae6fd;
      color: #0c4a6e;
    }
    .premium-result .ai-copy-output-btn:hover {
      background: #dbeafe;
    }
    .premium-result .ai-section-heading {
      color: #0f172a;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
    }
    .premium-result .ai-paragraph {
      color: #334155;
      font-size: 1.03rem;
      line-height: 1.72;
    }
    .premium-result .ai-bullet-item {
      background: #eaf6ff;
      border-left-color: #0ea5e9;
      color: #334155;
      font-size: 1.04rem;
      line-height: 1.6;
      font-weight: 600;
    }
    @media (max-width: 700px) {
      .premium-interview-card {
        width: calc(100vw - 28px);
        padding: 20px 14px 16px;
      }
    }
    .communication-sprint {
      border: 1px solid #7dd3fc;
      border-radius: 16px;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      padding: 16px;
    }
    .sprint-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sprint-title {
      margin: 0;
      color: #0f172a;
      font-size: 1.18rem;
    }
    .sprint-status-pill {
      border-radius: 999px;
      background: #0ea5e9;
      color: #fff;
      padding: 4px 10px;
      font-size: .82rem;
      font-weight: 700;
    }
    .sprint-subtitle {
      margin: 8px 0 12px;
      color: #334155;
    }
    .sprint-controls-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 8px 12px;
      align-items: center;
    }
    .sprint-transcript {
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: #ffffff;
      min-height: 88px;
      padding: 10px;
      color: #1e293b;
      line-height: 1.55;
    }
    .sprint-lesson-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .sprint-lesson-row.is-done {
      border-color: #22c55e;
      background: #f0fdf4;
    }
    .sprint-lesson-meta {
      color: #334155;
      font-size: .92rem;
    }
    .sprint-lesson-btn {
      border: none;
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #334155;
    }
    .sprint-lesson-btn.is-done {
      background: #16a34a;
    }
    @media (max-width: 700px) {
      .sprint-controls-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/idle-timeout.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // --- Interview Prep AI Download Logic ---
    let lastInterviewPrep = '';
    // Patch dashboard.js renderAIOutput to also update lastInterviewPrep
    const origRenderAIOutput = window.renderAIOutput;
    function customRenderAIOutput(text, el) {
      lastInterviewPrep = text;
      if (typeof origRenderAIOutput === 'function') {
        origRenderAIOutput(text, el);
      } else {
        // fallback: just show plain text
        el.textContent = text;
      }
    }
    window.renderAIOutput = customRenderAIOutput;

    // PDF formatting (college plan style)
    function formatInterviewPrepForPdf(text, doc) {
      const lines = String(text || '').split(/\r?\n/);
      let y = 20;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Interview Prep', 10, y);
      y += 10;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      lines.forEach(line => {
        if (/^\*\*[^*]+\*\*$/.test(line)) {
          y += 8;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(14);
          doc.text(line.replace(/\*\*/g, ''), 10, y);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(12);
          y += 6;
        } else if (/^[-â€˘*âś¦]/.test(line) || /^\d+\. /.test(line)) {
          doc.text(line.replace(/^[-â€˘*âś¦]\s*/, '\u2022 ').replace(/^\d+\.\s*/, ''), 14, y);
          y += 6;
        } else if (line.trim() === '') {
          y += 4;
        } else {
          doc.text(line, 10, y);
          y += 6;
        }
        if (y > 270) { doc.addPage(); y = 20; }
      });
    }

    function formatInterviewPrepForWord(text) {
      return (
        'Interview Prep\n\n' +
        text
          .replace(/^\*\*([^*]+)\*\*$/gm, '\n\n$1\n' + '-'.repeat(30))
          .replace(/^[-â€˘*âś¦]/gm, '  â€˘ ')
          .replace(/^\d+\. /gm, '  â€˘ ')
          .replace(/\n{2,}/g, '\n\n')
      );
    }

    document.getElementById('saveInterviewPrepPdfBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      if (!window.jspdf) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style=\"color:#dc2626;\">PDF library not loaded.</div>';
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      formatInterviewPrepForPdf(lastInterviewPrep, doc);
      doc.save('interview-prep.pdf');
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">PDF downloaded.</div>';
    };

    document.getElementById('saveInterviewPrepWordBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      const content = formatInterviewPrepForWord(lastInterviewPrep);
      const blob = new Blob([content], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'interview-prep.doc';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">Word document downloaded.</div>';
    };

    (function initCommunicationSprint() {
      const STORAGE_KEY = 'interview-prep:communication-sprint:v1';
      const LESSONS = [
        { id: 1, title: 'First Impression Hacks', minutes: 15, text: 'Your first thirty seconds set the frame. Open with a calm smile, grounded posture, and one clear value statement about your fit.' },
        { id: 2, title: 'Build Trust with Your Voice', minutes: 11, text: 'Slow down your first answer by ten percent. Use short sentence blocks so your points land with confidence and clarity.' },
        { id: 3, title: 'Confidence Wins', minutes: 10, text: 'Confidence sounds specific. Use evidence: what you did, why it mattered, and what result came from your action.' },
        { id: 4, title: 'Speak Up in Any Room', minutes: 10, text: 'Claim your space with concise framing. Start with the recommendation, then support it with two crisp reasons.' },
        { id: 5, title: 'Storytelling Secrets', minutes: 13, text: 'Use a short STAR pattern: situation, task, action, result. Keep each part focused and tied to the target role.' },
        { id: 6, title: 'Body Language That Supports Your Message', minutes: 15, text: 'Keep your shoulders open, chin neutral, and hands visible. Let posture reinforce your credibility, not distract from it.' },
        { id: 7, title: 'Read People Like a Pro', minutes: 15, text: 'Listen for cues in tone and pacing. Mirror interview energy lightly and adapt your depth based on the interviewer response.' },
        { id: 8, title: 'Give Tough Feedback Fast', minutes: 17, text: 'Lead with context, name the gap clearly, and end with forward action. Respectful directness builds leadership trust.' },
        { id: 9, title: 'Handle Difficult People Smartly', minutes: 13, text: 'Separate behavior from identity. Acknowledge emotion, reset on goals, and redirect to concrete next steps.' },
        { id: 10, title: 'Say No and Still Be Likable', minutes: 10, text: 'Say no to the request, not the person. Offer an alternative path so you protect priorities while preserving relationships.' },
        { id: 11, title: 'Interrupt Smoothly', minutes: 10, text: 'Use bridge phrases like, one quick thought to build on that. Keep it brief and return the floor promptly.' },
        { id: 12, title: 'Defuse Any Conflict', minutes: 15, text: 'Name the shared objective first. Then align on facts, options, and a clear owner for the next action.' },
        { id: 13, title: 'Listen Like a Leader', minutes: 11, text: 'Summarize before responding. When people feel heard, your influence rises and your answers become sharper.' },
        { id: 14, title: 'Small Talk Magic', minutes: 12, text: 'Use small talk as a bridge into relevance. Start warm, then connect naturally to role context and team outcomes.' }
      ];

      const lessonSelect = document.getElementById('sprintLessonSelect');
      const audioPlayer = document.getElementById('sprintAudioPlayer');
      const audioSource = document.getElementById('sprintAudioSource');
      const transcriptEl = document.getElementById('sprintTranscript');
      const notesEl = document.getElementById('sprintLessonNotes');
      const lessonsEl = document.getElementById('sprintLessons');
      const progressMetaEl = document.getElementById('sprintProgressMeta');
      const sessionMetaEl = document.getElementById('sprintSessionMeta');
      const statusPillEl = document.getElementById('sprintStatusPill');
      const doneBtn = document.getElementById('sprintDoneBtn');
      const resetBtn = document.getElementById('sprintResetBtn');
      let sessionTimerId = null;
      let sessionStartedAt = 0;
      let sessionDurationMs = 0;

      if (!lessonSelect || !audioPlayer || !audioSource || !transcriptEl || !notesEl || !lessonsEl || !progressMetaEl || !sessionMetaEl || !statusPillEl || !doneBtn || !resetBtn) {
        return;
      }

      function formatClock(ms) {
        const totalSec = Math.max(0, Math.floor(ms / 1000));
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      }

      function clearSessionTimer() {
        if (sessionTimerId) {
          clearInterval(sessionTimerId);
          sessionTimerId = null;
        }
      }

      function startSessionTimer(lessonMinutes) {
        clearSessionTimer();
        sessionDurationMs = lessonMinutes * 60 * 1000;
        sessionStartedAt = Date.now();
        sessionMetaEl.textContent = `Practice session running: ${formatClock(0)} / ${formatClock(sessionDurationMs)}`;
        sessionTimerId = setInterval(function () {
          const elapsed = Date.now() - sessionStartedAt;
          const safeElapsed = Math.min(elapsed, sessionDurationMs);
          sessionMetaEl.textContent = `Practice session running: ${formatClock(safeElapsed)} / ${formatClock(sessionDurationMs)}`;
          if (safeElapsed >= sessionDurationMs) {
            clearSessionTimer();
            sessionMetaEl.textContent = `Session complete: ${formatClock(sessionDurationMs)}. Mark lesson complete when ready.`;
          }
        }, 1000);
      }

      function readState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          const activeLessonId = Number(parsed.activeLessonId) || 1;
          return {
            activeLessonId: LESSONS.some((l) => l.id === activeLessonId) ? activeLessonId : 1,
            completed: Array.isArray(parsed.completed) ? parsed.completed.filter((id) => LESSONS.some((l) => l.id === id)) : [],
            notes: parsed.notes && typeof parsed.notes === 'object' ? parsed.notes : {}
          };
        } catch (_err) {
          return { activeLessonId: 1, completed: [], notes: {} };
        }
      }

      function writeState(next) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }

      function getCurrentLesson() {
        const lessonId = Number(lessonSelect.value) || 1;
        return LESSONS.find((l) => l.id === lessonId) || LESSONS[0];
      }

      const LESSON_AUDIO_PREFIX = 'assets/audio/rolerocket-presence-lab-lesson-';
      const FALLBACK_AUDIO_SRC = 'assets/audio/rolerocket-presence-lab-voiceover.m4a';
      let usingFallbackAudio = false;

      function setLessonAudioSource(lessonId) {
        usingFallbackAudio = false;
        audioSource.src = `${LESSON_AUDIO_PREFIX}${lessonId}.m4a`;
        audioPlayer.load();
      }

      function resetAudioPlayback() {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
      }

      function render() {
        const state = readState();
        const done = new Set(state.completed);
        const countDone = done.size;
        const pct = Math.round((countDone / LESSONS.length) * 100);
        const remaining = LESSONS.filter((l) => !done.has(l.id)).reduce((sum, l) => sum + l.minutes, 0);
        const total = LESSONS.reduce((sum, l) => sum + l.minutes, 0);
        const nextLesson = LESSONS.find((l) => !done.has(l.id));

        statusPillEl.textContent = `${countDone}/${LESSONS.length} complete`;
        progressMetaEl.textContent = `Progress ${pct}% | Runtime ${total} min | Remaining ${remaining} min | Next: ${nextLesson ? `Lesson ${nextLesson.id} ${nextLesson.title}` : 'Sprint complete'}`;

        lessonSelect.innerHTML = LESSONS.map((lesson) => `<option value="${lesson.id}">Lesson ${lesson.id}: ${lesson.title} (${lesson.minutes} min)</option>`).join('');
        lessonSelect.value = String(state.activeLessonId);

        const current = getCurrentLesson();
        notesEl.value = typeof state.notes[current.id] === 'string' ? state.notes[current.id] : '';
        transcriptEl.textContent = current.text;
        setLessonAudioSource(current.id);

        lessonsEl.innerHTML = LESSONS.map((lesson) => {
          const isDone = done.has(lesson.id);
          return `
            <div class="sprint-lesson-row ${isDone ? 'is-done' : ''}">
              <div class="sprint-lesson-meta"><strong>Lesson ${lesson.id}</strong> ${lesson.title} (${lesson.minutes} min)</div>
              <button type="button" class="sprint-lesson-btn ${isDone ? 'is-done' : ''}" data-lesson-id="${lesson.id}">${isDone ? 'Completed' : 'Mark Complete'}</button>
            </div>
          `;
        }).join('');
      }

      function updateActiveLesson(id) {
        const state = readState();
        const lessonId = Number(id);
        if (!LESSONS.some((l) => l.id === lessonId)) return;
        writeState({ ...state, activeLessonId: lessonId });
        render();
      }

      function toggleComplete(id) {
        const state = readState();
        const lessonId = Number(id);
        if (!LESSONS.some((l) => l.id === lessonId)) return;
        const done = new Set(state.completed);
        if (done.has(lessonId)) done.delete(lessonId);
        else done.add(lessonId);
        writeState({ ...state, completed: Array.from(done).sort((a, b) => a - b) });
        render();
      }

      function saveNotes() {
        const state = readState();
        const current = getCurrentLesson();
        const notes = { ...state.notes, [current.id]: notesEl.value.trim() };
        writeState({ ...state, notes });
      }

      function startLessonSession() {
        const current = getCurrentLesson();
        startSessionTimer(Math.max(1, current.minutes));
      }

      function stopLessonSession() {
        clearSessionTimer();
        if (!audioPlayer.ended) {
          sessionMetaEl.textContent = 'Session paused.';
        }
      }

      lessonSelect.addEventListener('change', function () {
        resetAudioPlayback();
        updateActiveLesson(lessonSelect.value);
      });

      notesEl.addEventListener('input', saveNotes);

      audioPlayer.addEventListener('play', startLessonSession);
      audioPlayer.addEventListener('pause', stopLessonSession);
      audioPlayer.addEventListener('ended', function () {
        clearSessionTimer();
        sessionMetaEl.textContent = 'Narration complete. Practice your response aloud and mark complete when ready.';
      });

      audioPlayer.addEventListener('error', function () {
        if (usingFallbackAudio) return;
        usingFallbackAudio = true;
        audioSource.src = FALLBACK_AUDIO_SRC;
        audioPlayer.load();
        sessionMetaEl.textContent = 'Lesson audio is unavailable right now. Loaded the backup guided narration.';
      });

      doneBtn.addEventListener('click', function () {
        toggleComplete(lessonSelect.value);
      });

      resetBtn.addEventListener('click', function () {
        resetAudioPlayback();
        stopLessonSession();
        writeState({ activeLessonId: 1, completed: [], notes: {} });
        sessionMetaEl.textContent = 'Session reset.';
        render();
      });

      lessonsEl.addEventListener('click', function (event) {
        const btn = event.target.closest('.sprint-lesson-btn');
        if (!btn) return;
        const id = btn.getAttribute('data-lesson-id');
        updateActiveLesson(id);
        toggleComplete(id);
      });

      render();
    })();
  </script>
  <script src="js/return-navigation.js"></script>
</body>
</html>
