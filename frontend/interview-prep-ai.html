<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <h1>Interview Prep</h1>
    <p>Generate likely interview questions, answer themes, and smart questions to ask the interviewer for your target role.</p>
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
  </div>
  <div class="card premium-interview-card" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:40px auto 32px auto;box-shadow:0 8px 32px #0ea5e950;">
    <label for="interviewRole" style="font-size:1.1em;"><strong>Role Title</strong></label>
    <input id="interviewRole" type="text" class="premium-input" placeholder="e.g. Product Manager" />
    <label for="interviewJobDescription" style="font-size:1.1em;"><strong>Job Description (optional)</strong></label>
    <textarea id="interviewJobDescription" rows="5" class="premium-input" placeholder="Paste the job description here..."></textarea>
    <div class="tool-action-bar">
      <div class="tool-primary-actions">
        <button id="interviewPrepBtn" class="auth-submit-btn premium-btn tool-action-btn tool-action-btn--primary" type="button">Generate Questions</button>
      </div>
      <div class="tool-secondary-actions">
        <button id="saveInterviewPrepPdfBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as PDF</button>
        <button id="saveInterviewPrepWordBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as Word</button>
      </div>
    </div>
    <div id="interviewPrepResult" class="premium-result" style="margin-top:24px;min-height:120px;"></div>
  </div>
  <style>
    .premium-interview-card {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      border: 2px solid #0ea5e9;
      border-radius: 22px;
      box-shadow: 0 12px 40px #0ea5e930;
      padding: 32px 28px 28px 28px;
      width: min(1120px, calc(100vw - 64px));
    }
    .premium-input {
      font-size: 1.13em;
      border: 1.5px solid #bae6fd;
      background: #f0f9ff;
      margin-bottom: 16px;
      border-radius: 12px;
      padding: 12px 14px;
      color: #0c4a6e;
      font-family: var(--font-body);
    }
    .premium-btn {
      font-size: 1.15em;
      font-weight: 700;
      border-radius: 12px;
      box-shadow: 0 4px 18px #0ea5e930;
      background: linear-gradient(90deg, #0ea5e9 0%, #0284c7 100%);
      transition: box-shadow 0.18s, filter 0.18s;
    }
    .premium-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 8px 32px #0ea5e950;
    }
    .premium-result {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px #0ea5e91a;
      padding: 24px 18px 18px 18px;
      border: 1.5px solid #bae6fd;
      font-size: 1.13em;
      color: #0c4a6e;
      min-height: 120px;
    }
    .premium-result .ai-question {
      background: linear-gradient(90deg, #e0f2fe 0%, #f8fafc 100%);
      border-left: 4px solid #0ea5e9;
      border-radius: 12px;
      margin-bottom: 18px;
      padding: 16px 16px 10px 18px;
      font-size: 1.12em;
      font-weight: 700;
      color: #0c4a6e;
      box-shadow: 0 2px 10px #0ea5e91a;
    }
    .premium-result .ai-theme {
      background: #f0f9ff;
      border-radius: 10px;
      margin-bottom: 14px;
      padding: 10px 14px;
      font-size: 1em;
      color: #0369a1;
      border-left: 3px solid #bae6fd;
    }
    .premium-result .ai-output-header {
      background: #f8fbff;
      border-bottom: 1px solid #dbeafe;
    }
    .premium-result .ai-output-label {
      color: #38bdf8;
    }
    .premium-result .ai-copy-output-btn {
      background: #ecfeff;
      border-color: #bae6fd;
      color: #0c4a6e;
    }
    .premium-result .ai-copy-output-btn:hover {
      background: #dbeafe;
    }
    .premium-result .ai-section-heading {
      color: #0f172a;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
    }
    .premium-result .ai-paragraph {
      color: #334155;
      font-size: 1.03rem;
      line-height: 1.72;
    }
    .premium-result .ai-bullet-item {
      background: #eaf6ff;
      border-left-color: #0ea5e9;
      color: #334155;
      font-size: 1.04rem;
      line-height: 1.6;
      font-weight: 600;
    }
    @media (max-width: 700px) {
      .premium-interview-card {
        width: calc(100vw - 28px);
        padding: 20px 14px 16px;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // --- Interview Prep AI Download Logic ---
    let lastInterviewPrep = '';
    // Patch dashboard.js renderAIOutput to also update lastInterviewPrep
    const origRenderAIOutput = window.renderAIOutput;
    function customRenderAIOutput(text, el) {
      lastInterviewPrep = text;
      if (typeof origRenderAIOutput === 'function') {
        origRenderAIOutput(text, el);
      } else {
        // fallback: just show plain text
        el.textContent = text;
      }
    }
    window.renderAIOutput = customRenderAIOutput;

    // PDF formatting (college plan style)
    function formatInterviewPrepForPdf(text, doc) {
      const lines = String(text || '').split(/\r?\n/);
      let y = 20;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Interview Prep', 10, y);
      y += 10;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      lines.forEach(line => {
        if (/^\*\*[^*]+\*\*$/.test(line)) {
          y += 8;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(14);
          doc.text(line.replace(/\*\*/g, ''), 10, y);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(12);
          y += 6;
        } else if (/^[-•*✦]/.test(line) || /^\d+\. /.test(line)) {
          doc.text(line.replace(/^[-•*✦]\s*/, '\u2022 ').replace(/^\d+\.\s*/, ''), 14, y);
          y += 6;
        } else if (line.trim() === '') {
          y += 4;
        } else {
          doc.text(line, 10, y);
          y += 6;
        }
        if (y > 270) { doc.addPage(); y = 20; }
      });
    }

    function formatInterviewPrepForWord(text) {
      return (
        'Interview Prep\n\n' +
        text
          .replace(/^\*\*([^*]+)\*\*$/gm, '\n\n$1\n' + '-'.repeat(30))
          .replace(/^[-•*✦]/gm, '  • ')
          .replace(/^\d+\. /gm, '  • ')
          .replace(/\n{2,}/g, '\n\n')
      );
    }

    document.getElementById('saveInterviewPrepPdfBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      if (!window.jspdf) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style=\"color:#dc2626;\">PDF library not loaded.</div>';
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      formatInterviewPrepForPdf(lastInterviewPrep, doc);
      doc.save('interview-prep.pdf');
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">PDF downloaded.</div>';
    };

    document.getElementById('saveInterviewPrepWordBtn').onclick = function() {
      if (!lastInterviewPrep) {
        document.getElementById('interviewPrepResult').innerHTML = '<div style="color:#dc2626;">No interview prep to save. Please generate first.</div>';
        return;
      }
      const content = formatInterviewPrepForWord(lastInterviewPrep);
      const blob = new Blob([content], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'interview-prep.doc';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('interviewPrepResult').innerHTML += '<div style="color:#16a34a;">Word document downloaded.</div>';
    };
  </script>
</body>
</html>
