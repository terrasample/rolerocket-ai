    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature elite" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:32px auto;text-align:center;">
        <h2 class="feature-title">Calendar & Task AI</h2>
        <p>AI-powered calendar and task management for your job search workflow.</p>
        <div style="display:grid;gap:12px;text-align:left;width:100%;max-width:1000px;margin:20px auto;">
          <label for="calendarRoleInput"><strong>Primary Job Search Goal</strong></label>
          <input id="calendarRoleInput" type="text" style="width:100%;" placeholder="e.g. Land product manager interviews this month" />
          <label for="calendarHoursInput"><strong>Hours Available This Week</strong></label>
          <input id="calendarHoursInput" type="text" style="width:100%;" placeholder="e.g. 8 hours" />
          <label for="calendarConstraintsInput"><strong>Constraints or Priorities</strong></label>
          <textarea id="calendarConstraintsInput" style="width:100%;height:120px;" placeholder="Add interviews, networking goals, deadlines, or limited availability."></textarea>
        </div>
        <div style="margin:18px 0;">
          <button id="generateCalendarTaskBtn" class="feature-launch-btn">Generate Weekly Plan</button>
        </div>
        <div id="calendarTaskResult" style="display:none;">
          <textarea id="calendarTaskText" readonly style="width:100%;height:220px;margin:18px 0;"></textarea>
        </div>
        <div id="calendarTaskDownloads" style="display:none;margin:18px 0;">
          <button id="downloadCalendarTaskPdfBtn" class="feature-launch-btn" style="margin-right:12px;">Download as PDF</button>
          <button id="downloadCalendarTaskWordBtn" class="feature-launch-btn">Download as Word</button>
        </div>
        <div id="calendarTaskOutput"></div>
      </section>
    </main>
