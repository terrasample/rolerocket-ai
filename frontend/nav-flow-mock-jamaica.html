<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jamaica Nav Flow Mock</title>
  <style>
    :root {
      --bg-a: #071325;
      --bg-b: #0b1d38;
      --card: #233248;
      --card-border: #32465f;
      --active-bg: #0d2f56;
      --active-border: #1a93d1;
      --text: #f7fbff;
      --muted: #9ab0c8;
      --pill: #1b2b40;
      --pill-border: #2f4158;
      --section: #7ec8ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(60% 60% at 90% 12%, #0a7f47 0%, transparent 60%),
        radial-gradient(70% 60% at 12% 88%, #1f3a8a33 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
    }

    .sidebar {
      width: min(560px, 94vw);
      padding: 26px 22px 30px;
      border-right: 1px solid #1a2942;
      background: linear-gradient(180deg, #0c1d35cc, #081426cc);
      box-shadow: 0 22px 48px #00000066;
      border-radius: 18px;
    }

    .menu-link {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 18px 26px;
      border-radius: 22px;
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-size: clamp(1.05rem, 2.2vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .menu-link.active {
      background: linear-gradient(165deg, var(--active-bg), #0b2746);
      border-color: var(--active-border);
      box-shadow: inset 0 0 0 1px #36b5ef33;
    }

    .divider {
      height: 1px;
      margin: 18px 4px;
      background: linear-gradient(90deg, transparent, #2f4664, transparent);
    }

    .plan-badge {
      display: inline-block;
      margin: 8px 0 16px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--pill-border);
      background: var(--pill);
      color: #d3e4f7;
      font-weight: 700;
    }

    .section-label {
      margin: 14px 6px 8px;
      color: var(--section);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hint {
      margin: 10px 6px 2px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <aside class="sidebar" aria-label="Navigation mock">
    <a class="menu-link" href="#">Home</a>
    <a class="menu-link" href="#">About Us</a>
    <a class="menu-link" href="#">Features</a>
    <a class="menu-link" href="#">Find, Search &amp; Track</a>
    <a class="menu-link" href="#">AI Recruiter Assist</a>
    <a class="menu-link" href="#">Pricing</a>
    <a class="menu-link" href="#">Contact Us</a>

    <div class="section-label">Jamaica Hub</div>
    <a class="menu-link active" href="#">🇯🇲 Jamaica Workforce Accelerator</a>
    <a class="menu-link" href="#">📱 Job Alerts</a>
    <a class="menu-link" href="#">🏫 Cohort Manager</a>

    <div class="divider"></div>
    <span class="plan-badge">Lifetime Access</span>

    <div class="section-label">Account</div>
    <a class="menu-link" href="#">👤 Account</a>
    <a class="menu-link" href="#">🧑‍💼 My Dashboard</a>
    <a class="menu-link" href="#">Logout</a>

    <p class="hint">Proposed flow: Global links → Jamaica Hub cluster → Account links.</p>
  </aside>
  <script src="js/nav-plan-sync.js"></script>
</body>
</html>
