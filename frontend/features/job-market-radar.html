<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Market Radar | RoleRocket AI</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="hero">
    <h1>Job Market Radar</h1>
    <p>Get real-time alerts for roles matching your skills, with AI-predicted fit and urgency scores.</p>
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
  </div>
  <main class="main" tabindex="-1">
    <div class="card" style="max-width:600px;margin:auto;">
      <label for="radarKeywords"><strong>Keywords/Skills</strong></label>
      <input id="radarKeywords" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Python, Product Management" />
      <button id="startRadarBtn" class="auth-submit-btn" style="margin-bottom:10px;">Start Radar</button>
      <div id="radarResults" style="margin-top:18px;"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:18px;">
        <button id="saveRadarPdfBtn" class="auth-submit-btn" style="background:#38bdf8;color:#1e293b;min-width:140px;">Save as PDF</button>
        <button id="saveRadarWordBtn" class="auth-submit-btn" style="background:#6366f1;color:#fff;min-width:140px;">Save as Word</button>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../js/api-base.js"></script>
  <script src="../js/auth-storage.js"></script>
  <script src="../js/idle-timeout.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    // Placeholder for college style formatting and download logic
    let lastRadar = '';
    document.getElementById('saveRadarPdfBtn').onclick = function() {
      if (!lastRadar) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Job Market Radar', 10, 20);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      doc.text(lastRadar, 10, 32, { maxWidth: 180 });
      doc.save('job-market-radar.pdf');
    };
    document.getElementById('saveRadarWordBtn').onclick = function() {
      if (!lastRadar) return;
      const blob = new Blob([lastRadar], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'job-market-radar.doc';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
  </script>
  <script src="../js/return-navigation.js"></script>
</body>
</html>
