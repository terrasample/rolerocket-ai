<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Portfolio/Project Builder | RoleRocket AI</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="hero">
    <h1>AI Portfolio/Project Builder</h1>
    <p>Instantly generate a portfolio site or project summaries from your resume and job targets.</p>
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
  </div>
  <main class="main" tabindex="-1">
    <div class="card" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:32px auto;">
      <label for="portfolioResume"><strong>Paste Your Resume</strong></label>
      <textarea id="portfolioResume" rows="6" style="width:100%;margin-bottom:10px;" placeholder="Paste your resume here..."></textarea>
      <label for="portfolioTarget"><strong>Target Job/Field</strong></label>
      <input id="portfolioTarget" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Data Scientist" />
      <button id="generatePortfolioBtn" class="auth-submit-btn" style="margin-bottom:10px;">Generate Portfolio</button>
      <div id="portfolioResult" style="margin-top:18px;"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:18px;">
        <button id="savePortfolioPdfBtn" class="auth-submit-btn" style="background:#38bdf8;color:#1e293b;min-width:140px;">Save as PDF</button>
        <button id="savePortfolioWordBtn" class="auth-submit-btn" style="background:#6366f1;color:#fff;min-width:140px;">Save as Word</button>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../js/api-base.js"></script>
  <script src="../js/auth-storage.js"></script>
  <script src="../js/idle-timeout.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    // Placeholder for college style formatting and download logic
    let lastPortfolio = '';
    document.getElementById('savePortfolioPdfBtn').onclick = function() {
      if (!lastPortfolio) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('Portfolio/Project', 10, 20);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      doc.text(lastPortfolio, 10, 32, { maxWidth: 180 });
      doc.save('portfolio.pdf');
    };
    document.getElementById('savePortfolioWordBtn').onclick = function() {
      if (!lastPortfolio) return;
      const blob = new Blob([lastPortfolio], { type: 'application/msword' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'portfolio.doc';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
  </script>
  <script src="../js/return-navigation.js"></script>
</body>
</html>
