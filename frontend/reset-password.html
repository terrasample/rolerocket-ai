<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | RoleRocket AI</title>
  <meta name="description" content="Set a new password for your RoleRocket AI account." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-page">

  <section class="landing-hero auth-hero">
    <div class="auth-shell">
      <div class="auth-left">
        <div class="landing-badge">🔒 New Password</div>
        <h1>Create a new password</h1>
        <p>Choose a strong password you haven't used before. You'll be logged in automatically after resetting.</p>
      </div>

      <div class="auth-card">
        <div class="auth-card-top">
          <span class="preview-pill">RESET PASSWORD</span>
        </div>

        <h2>Set new password</h2>
        <p class="auth-subtext">Must be at least 8 characters.</p>

        <form id="resetForm" class="auth-form">
          <input id="newPassword" type="password" placeholder="New password" minlength="8" required />
          <input id="confirmPassword" type="password" placeholder="Confirm new password" minlength="8" required />
          <button type="submit" class="auth-submit-btn" id="submitBtn">Update Password</button>
        </form>

        <div id="resetMessage" class="auth-message"></div>

        <p class="auth-footer">
          <a href="login.html">Back to login</a>
        </p>
      </div>
    </div>
  </section>

  <script>
    const form = document.getElementById('resetForm');
    const message = document.getElementById('resetMessage');
    const submitBtn = document.getElementById('submitBtn');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      message.textContent = 'Invalid or missing reset link. Please request a new one.';
      message.style.color = '#dc2626';
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match.';
        message.style.color = '#dc2626';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      message.textContent = '';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Reset failed');

        message.textContent = '✅ Password updated! Redirecting to login...';
        message.style.color = '#16a34a';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        message.textContent = `❌ ${err.message}`;
        message.style.color = '#dc2626';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>

</body>
</html>
