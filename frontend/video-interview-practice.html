<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Interview Practice | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/jspdf-loader.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <div class="hero contact-hero">
    <h1 class="home-brand-title"><span class="home-brand-rocket" aria-hidden="true">🚀</span><span>RoleRocket AI</span></h1>
    <p class="home-brand-subtitle">Video Interview Practice</p>
  </div>
  <div class="layout">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="sidebar-link-btn" href="index.html">Home</a>
      <a class="sidebar-link-btn" href="features.html">Features</a>
      <a class="sidebar-link-btn" href="dashboard.html">My Dashboard</a>
    </aside>
    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature elite" style="max-width:700px;margin:0 auto 32px auto;text-align:center;">
        <h2 class="feature-title">Video Interview Practice</h2>
        <p>Practice live interview calls with AI and get instant feedback and improvement pointers after each session.</p>
        <button id="startInterviewBtn" class="feature-launch-btn" style="margin-bottom:18px;">Start Video Interview Practice</button>
        <div id="videoCallContainer" style="display:none;justify-content:center;align-items:center;gap:32px;margin:24px 0;">
          <div style="display:flex;flex-direction:column;align-items:center;">
            <video id="userVideo" autoplay muted playsinline style="width:220px;height:165px;background:#222;border-radius:12px;border:2px solid #2563eb;"></video>
            <div style="margin-top:8px;font-weight:bold;">You</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;">
            <img id="aiRecruiterAvatar" src="assets/ai-recruiter-animated.gif" alt="AI Recruiter" style="width:120px;height:120px;border-radius:50%;border:2px solid #facc15;background:#fff;object-fit:cover;" />
            <div style="margin-top:8px;font-weight:bold;">AI Recruiter</div>
          </div>
        </div>
        <div id="interviewQAContainer" style="display:none;margin:24px 0;"></div>
        <div id="videoInterviewOutput"></div>
      </section>

  <script src="js/video-interview-practice.js"></script>
