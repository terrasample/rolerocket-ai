<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Reference Generator | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/jspdf-loader.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <div class="hero contact-hero">
    <h1 class="home-brand-title"><span class="home-brand-rocket" aria-hidden="true">🚀</span><span>RoleRocket AI</span></h1>
    <p class="home-brand-subtitle">AI Reference Generator</p>
  </div>
  <div class="layout">
    <aside class="sidebar" aria-label="Primary navigation">
      <h2 aria-label="RoleRocket AI"></h2>
      <nav>
        <a class="sidebar-link-btn" href="index.html">Home</a>
        <a class="sidebar-link-btn" href="about-us.html">About Us</a>
        <a class="sidebar-link-btn active" href="features.html">Features</a>
        <a class="sidebar-link-btn" href="job-tracking.html">Find, Search & Track</a>
        <a class="sidebar-link-btn" href="ai-recruiter-assist.html">AI Recruiter Assist</a>
        <a class="sidebar-link-btn" href="pricing.html">Pricing</a>
        <a class="sidebar-link-btn" href="contact-us.html">Contact Us</a>
        <hr />
        <p id="planBadge">Free Plan</p>
        <a class="sidebar-link-btn" href="account.html">👤 Account</a>
        <a class="sidebar-link-btn premium-btn" href="dashboard.html">🧑‍💼 My Dashboard</a>
        <a class="sidebar-link-btn" href="login.html?relogin=1">Logout</a>
      </nav>
    </aside>
    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature premium" style="max-width:700px;margin:0 auto 32px auto;text-align:center;">
        <h2 class="feature-title">AI Reference Generator</h2>
        <p>Generate professional references and recommendation letters with AI assistance.</p>
        <button id="startReferenceGenBtn" class="feature-launch-btn" style="margin-bottom:18px;">Start Reference Generation</button>
        <div id="referenceGenContainer" style="display:none;text-align:left;max-width:600px;margin:0 auto;">
          <div id="referenceGenForm" style="margin:18px 0;">
            <label for="refName" style="display:block;margin-bottom:10px;">Name to Recommend<br /><input id="refName" style="width:100%;margin-top:6px;" /></label>
            <label for="refPosition" style="display:block;margin-bottom:10px;">Position<br /><input id="refPosition" style="width:100%;margin-top:6px;" /></label>
            <label for="refRelationship" style="display:block;margin-bottom:10px;">Relationship / Context<br /><input id="refRelationship" style="width:100%;margin-top:6px;" placeholder="Example: direct manager for 3 years" /></label>
            <label for="refStrengths" style="display:block;margin-bottom:10px;">Key Strengths<br /><textarea id="refStrengths" style="width:100%;height:90px;margin-top:6px;" placeholder="Example: leadership, cross-functional communication, reliable delivery"></textarea></label>
            <label for="refYourName" style="display:block;margin-bottom:10px;">Your Name<br /><input id="refYourName" style="width:100%;margin-top:6px;" /></label>
            <button id="generateRefBtn" class="feature-launch-btn" type="button" style="margin-top:8px;">Generate Reference Letter</button>
          </div>
          <div id="referenceGenResult" style="display:none;">
            <label for="referenceGenText" style="display:block;margin-bottom:8px;">Generated Reference Letter</label>
            <textarea id="referenceGenText" style="width:100%;height:220px;margin:0 0 18px 0;"></textarea>
            <div id="referenceGenDownloads" style="display:none;margin:18px 0;text-align:center;">
            <button id="downloadReferenceGenPdfBtn" class="feature-launch-btn" style="margin-right:12px;">Download as PDF</button>
            <button id="downloadReferenceGenWordBtn" class="feature-launch-btn">Download as Word</button>
            </div>
            <div style="text-align:center;">
              <button id="restartRefBtn" class="feature-launch-btn" type="button">Start Again</button>
            </div>
          </div>
        </div>
        <div id="referenceGenOutput"></div>
      </section>
    </main>
  </div>
  <script src="js/ai-reference-generator.js"></script>
</body>
</html>
