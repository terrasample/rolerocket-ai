<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-Click Apply Queue | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="hero">
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
    <h1>1-Click Apply Queue</h1>
    <p>Send your best matches into the ready queue and execute applications quickly when timing matters.</p>
  </div>
  <main id="main" class="main" tabindex="-1">
  <div class="card" style="max-width:720px;margin:32px auto;">
    <label for="applyRole"><strong>Target Role</strong></label>
    <input id="applyRole" type="text" style="width:100%;margin-bottom:12px;" placeholder="e.g. Product Manager" />
    <label for="applyQueue"><strong>Jobs to Queue</strong></label>
    <textarea id="applyQueue" rows="5" style="width:100%;margin-bottom:12px;" placeholder="Add one job per line or separate entries with commas."></textarea>
    <p class="tool-helper-text">Queued jobs are saved to your tracker, marked ready for follow-up, and surfaced in your 1-click recommendations.</p>
    <div class="tool-action-bar">
      <div class="tool-primary-actions">
        <button id="queueApplyBtn" class="auth-submit-btn tool-action-btn tool-action-btn--primary" type="button">Queue Applications</button>
      </div>
      <div class="tool-secondary-actions">
        <button id="loadQueueBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Refresh Queue</button>
        <button id="runOneClickApplyBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Find Top Matches</button>
      </div>
    </div>
    <div id="applyQueueResult" style="margin-top:18px;min-height:80px;"></div>
    <section class="queue-section" aria-labelledby="queueRecommendationsTitle">
      <h2 id="queueRecommendationsTitle" class="queue-section-title">Top Ready Matches</h2>
      <div id="queueRecommendations" class="queue-match-list"></div>
    </section>
    <section class="queue-section" aria-labelledby="queuedJobsTitle">
      <h2 id="queuedJobsTitle" class="queue-section-title">Queued Jobs</h2>
      <div id="queuedJobsList" class="queue-job-list"></div>
    </section>
  </div>
  </main>
  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/one-click-apply-queue.js"></script>
</body>
</html>
