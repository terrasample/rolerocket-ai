<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="48%"  stop-color="#007847"/>
      <stop offset="100%" stop-color="#fdb714"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- diagonal texture lines -->
    <pattern id="tex" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#tex)"/>

  <!-- ambient glow orb top-right -->
  <circle cx="1050" cy="80" r="260" fill="rgba(253,183,20,0.18)" filter="url(#glow)"/>
  <!-- ambient glow orb bottom-left -->
  <circle cx="120" cy="540" r="200" fill="rgba(0,120,71,0.22)" filter="url(#glow)"/>

  <!-- left accent bar -->
  <rect x="72" y="90" width="6" height="160" rx="3" fill="rgba(255,255,255,0.55)"/>

  <!-- badge pill -->
  <rect x="90" y="90" width="268" height="44" rx="22" fill="url(#pill)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="174" y="119" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2" text-anchor="middle">ROLEROCKET AI</text>

  <!-- rocket emoji -->
  <text x="120" y="119" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif" font-size="20" text-anchor="middle">🚀</text>

  <!-- main headline -->
  <text x="90" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-1">WhatsApp</text>
  <text x="90" y="328" font-family="'Segoe UI',Arial,sans-serif" font-size="78" font-weight="800" fill="#fdb714" letter-spacing="-1">Assistant</text>

  <!-- sub headline -->
  <text x="90" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.82)">Your AI job-search operator. Apply Smarter. Get Hired Faster.</text>

  <!-- divider -->
  <line x1="90" y1="430" x2="600" y2="430" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- stat pills row -->
  <rect x="90"  y="450" width="155" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="168" y="479" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Import Jobs</text>

  <rect x="260" y="450" width="175" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="348" y="479" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Track Pipeline</text>

  <rect x="450" y="450" width="165" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="533" y="479" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">AI Execution</text>

  <!-- domain badge bottom-left -->
  <text x="90" y="590" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.55)" letter-spacing="1">rolerocketai.com</text>

  <!-- large R logo mark right side -->
  <text x="820" y="490" font-family="'Segoe UI Black',Arial,sans-serif" font-size="420" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">R</text>

  <!-- logo text right -->
  <text x="820" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="rgba(255,255,255,0.15)" text-anchor="middle">RoleRocket</text>
  <text x="820" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="rgba(253,183,20,0.2)" text-anchor="middle">AI</text>
</svg>
