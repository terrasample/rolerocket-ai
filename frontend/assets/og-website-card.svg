<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="48%"  stop-color="#007847"/>
      <stop offset="100%" stop-color="#fdb714"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="tex" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#tex)"/>

  <circle cx="1050" cy="80" r="260" fill="rgba(253,183,20,0.18)" filter="url(#glow)"/>
  <circle cx="120" cy="540" r="200" fill="rgba(0,120,71,0.22)" filter="url(#glow)"/>

  <rect x="72" y="90" width="6" height="160" rx="3" fill="rgba(255,255,255,0.55)"/>

  <!-- badge pill -->
  <rect x="90" y="90" width="260" height="44" rx="22" fill="url(#pill)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="170" y="119" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2" text-anchor="middle">ROLEROCKET AI</text>
  <text x="110" y="119" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif" font-size="20" text-anchor="middle">🚀</text>

  <!-- headline -->
  <text x="90" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">Your Career</text>
  <text x="90" y="318" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="800" fill="#fdb714" letter-spacing="-1">Execution System</text>

  <text x="90" y="385" font-family="'Segoe UI',Arial,sans-serif" font-size="27" font-weight="400" fill="rgba(255,255,255,0.82)">AI job search · Resume optimizer · Cover letter · Interview prep</text>

  <line x1="90" y1="425" x2="600" y2="425" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <rect x="90"  y="445" width="148" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="164" y="474" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">AI Resume</text>

  <rect x="254" y="445" width="160" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="334" y="474" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Job Tracker</text>

  <rect x="430" y="445" width="180" height="46" rx="23" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="520" y="474" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Interview Prep</text>

  <text x="90" y="590" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.55)" letter-spacing="1">rolerocketai.com</text>

  <!-- watermark R -->
  <text x="820" y="490" font-family="'Segoe UI Black',Arial,sans-serif" font-size="420" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">R</text>
  <text x="820" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="rgba(255,255,255,0.15)" text-anchor="middle">RoleRocket</text>
  <text x="820" y="360" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="800" fill="rgba(253,183,20,0.2)" text-anchor="middle">AI</text>
</svg>
