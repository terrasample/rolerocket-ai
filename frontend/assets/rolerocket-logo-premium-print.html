RoleRocket AI<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RoleRocket AI – Premium Logo Export</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Playfair+Display:wght@600&display=swap');
    @page { size: A4 landscape; margin: 0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 297mm;
      height: 210mm;
      background: #0f172a;
      font-family: 'Cinzel', Georgia, serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }
    .page {
      width: 297mm;
      height: 210mm;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Subtle decorative glow blobs */
    .page::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(250,204,21,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .page::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-card {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(250,204,21,0.2);
      border-radius: 24px;
      padding: 36mm 28mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      box-shadow:
        0 0 60px rgba(250,204,21,0.07),
        0 20px 60px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .rocket {
      font-size: 72px;
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(250,204,21,0.5));
    }
    .brand-name {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, #fff8dc 0%, #facc15 46%, #b45309 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      text-shadow: none;
      filter: drop-shadow(0 4px 16px rgba(250,204,21,0.35));
    }
    .subtitle {
      margin-top: 14px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #93c5fd;
      text-transform: uppercase;
      filter: drop-shadow(0 2px 6px rgba(14,165,233,0.4));
    }
    .divider {
      margin-top: 12px;
      width: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(250,204,21,0.4), transparent);
    }
    .screen-only {
      position: fixed;
      bottom: 12px; left: 50%; transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 13px;
      color: #94a3b8;
      background: rgba(15,23,42,0.9);
      padding: 8px 20px;
      border-radius: 99px;
      border: 1px solid rgba(148,163,184,0.2);
    }
    @media print { .screen-only { display: none; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-card">
      <div class="brand-row">
        <span class="rocket">🚀</span>
        <span class="brand-name">RoleRocket AI</span>
      </div>
      <div class="subtitle">Your AI Career System</div>
      <div class="divider"></div>
    </div>
  </div>
  <div class="screen-only">Press Ctrl+P → Save as PDF to export</div>
</body>
</html>
