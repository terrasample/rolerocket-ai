<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics | RoleRocket AI</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#analyticsMain">Skip to analytics content</a>

  <div class="hero">
    <h1>Analytics Control Center</h1>
    <p>Daily telemetry, funnel performance, and plan-level outcome cohorts.</p>
  </div>

  <div class="layout">
    <div class="sidebar">
      <h2>🚀 RoleRocket AI</h2>
      <button onclick="window.location.href='dashboard.html'">← Dashboard</button>
      <button id="refreshAnalyticsBtn">Refresh Data</button>
      <button id="logoutBtn">Logout</button>
    </div>

    <main class="main" id="analyticsMain" tabindex="-1">
      <div class="grid analytics-grid">
        <section class="card">
          <h3>Overview</h3>
          <div id="analyticsOverview" class="empty-state">Loading overview...</div>
        </section>

        <section class="card">
          <h3>Top Events</h3>
          <div id="topEvents" class="analytics-list"></div>
        </section>

        <section class="card">
          <h3>Funnels</h3>
          <div id="funnelEvents" class="analytics-list"></div>
        </section>

        <section class="card">
          <h3>Daily Trend</h3>
          <div id="dailyTrend" class="analytics-list"></div>
        </section>

        <section class="card" style="grid-column: 1 / -1;">
          <h3>Outcome Cohorts</h3>
          <div id="cohortsTable" class="analytics-table-wrap"></div>
        </section>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    &copy; 2026 RoleRocket AI &nbsp;&middot;&nbsp;
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </footer>

  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
