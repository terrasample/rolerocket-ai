<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cover Letter Generator | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="hero">
    <h1>Cover Letter Generator</h1>
    <p>Generate a tailored cover letter for your target job in seconds.</p>
  </div>
  <main id="main" class="main" tabindex="-1">
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 18px 0;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
    <div class="card" style="max-width:600px;margin:auto;">
      <label for="coverJobTitle"><strong>Target Job Title</strong></label>
      <input id="coverJobTitle" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Software Engineer" />
      <label for="coverCompany"><strong>Company <span style="font-weight:normal;color:#64748b;">(optional)</span></strong></label>
      <input id="coverCompany" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Acme Corp (optional)" />
      <label for="coverResume"><strong>Your Baseline Resume (paste or upload)</strong></label>
      <textarea id="coverResume" rows="6" style="width:100%;margin-bottom:10px;" placeholder="Paste your baseline resume here..."></textarea>
      <input id="coverResumeUpload" type="file" accept=".txt,.md,.rtf,.pdf,.docx,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style="width:100%;margin-bottom:10px;" />
      <div id="coverResumeUploadMessage" style="margin:-4px 0 10px 0;font-size:0.95rem;color:#64748b;"></div>
      <label for="coverJobDescription"><strong>Full Job Description</strong></label>
      <textarea id="coverJobDescription" rows="8" style="width:100%;margin-bottom:10px;" placeholder="Paste the full job description here..."></textarea>
      <div class="tool-action-bar">
        <div class="tool-primary-actions">
          <button id="generateCoverBtn" class="auth-submit-btn tool-action-btn tool-action-btn--primary" type="button">Generate Cover Letter</button>
        </div>
        <div class="tool-secondary-actions">
          <button id="clearCoverFieldsBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Clear Fields</button>
          <button id="saveCoverPdfBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as PDF</button>
          <button id="saveCoverWordBtn" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as Word</button>
        </div>
      </div>
      <div id="coverLetterOutput" style="margin-top:18px;"></div>
    </div>
  </main>
  <footer class="site-footer">
    &copy; 2026 RoleRocket AI &nbsp;&middot;&nbsp;
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="refund-policy.html">Refund Policy</a>
  </footer>

  <script src="js/jspdf-loader.js"></script>
  <script src="js/cover-letter-generator.js"></script>
</body>
</html>
