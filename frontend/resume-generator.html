<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Generator | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="hero">
    <h1>Resume Generator</h1>
    <p>Generate a tailored resume for your target job in seconds.</p>
  </div>
  <main id="main" class="main" tabindex="-1">
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 18px 0;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
    <div class="card" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:32px auto;">
      <label for="resumeJobTitleGen"><strong>Target Job Title</strong></label>
      <input id="resumeJobTitleGen" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Data Scientist" />
      <label for="resumeCompanyGen"><strong>Company <span style="font-weight:normal;color:#64748b;">(optional)</span></strong></label>
      <input id="resumeCompanyGen" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Acme Corp (optional)" />
      <div style="margin-bottom:12px;padding:12px;border:1px solid #dbe3ea;border-radius:10px;background:#f8fafc;">
        <label for="resumeLayoutSelectGen"><strong>Resume Layout</strong></label>
        <select id="resumeLayoutSelectGen" style="width:100%;margin:8px 0 8px 0;"></select>
        <div id="resumeLayoutHelpGen" style="font-size:0.92rem;color:#64748b;"></div>
        <button id="resumeRefreshLayoutBtnGen" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" style="display:none;margin-top:10px;">Refresh Elite Layout</button>
      </div>
      <label for="resumeBaseGen"><strong>Your Baseline Resume (paste or upload)</strong></label>
      <textarea id="resumeBaseGen" rows="6" style="width:100%;margin-bottom:10px;" placeholder="Paste your baseline resume here..."></textarea>
      <input id="resumeBaseUploadGen" type="file" accept=".txt,.md,.rtf,.pdf,.docx,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style="width:100%;margin-bottom:10px;" />
      <div id="resumeBaseUploadMessageGen" style="margin:-4px 0 10px 0;font-size:0.95rem;color:#64748b;"></div>
      <label for="resumePhotoUploadGen"><strong>Profile Photo <span style="font-weight:normal;color:#64748b;">(optional — enhances your resume design)</span></strong></label>
      <input id="resumePhotoUploadGen" type="file" accept="image/jpeg,image/png,image/webp" style="width:100%;margin-bottom:6px;" />
      <div id="resumePhotoPreviewGen" style="margin-bottom:10px;min-height:0;"></div>
      <div id="resumePhotoActionsGen" style="display:none;gap:8px;flex-wrap:wrap;margin:-4px 0 10px 0;">
        <button id="resumePhotoReplaceBtnGen" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary">Choose Another Photo</button>
        <button id="resumePhotoRemoveBtnGen" type="button" class="auth-submit-btn tool-action-btn tool-action-btn--secondary">Use No Photo</button>
      </div>
      <div id="resumePhotoControlsGen" style="display:none;margin:-2px 0 12px 0;padding:12px;border:1px solid #dbe3ea;border-radius:10px;background:#f8fafc;">
        <div style="font-weight:700;color:#334155;margin-bottom:8px;">Adjust photo framing</div>
        <label for="resumePhotoXGen" style="display:block;font-size:0.92rem;color:#475569;margin-bottom:6px;">Move left / right</label>
        <input id="resumePhotoXGen" type="range" min="0" max="100" value="50" style="width:100%;margin-bottom:10px;" />
        <label for="resumePhotoYGen" style="display:block;font-size:0.92rem;color:#475569;margin-bottom:6px;">Move up / down</label>
        <input id="resumePhotoYGen" type="range" min="0" max="100" value="35" style="width:100%;" />
      </div>
      <label for="resumeJobDescriptionGen"><strong>Full Job Description</strong></label>
      <textarea id="resumeJobDescriptionGen" rows="8" style="width:100%;margin-bottom:10px;" placeholder="Paste the full job description here..."></textarea>
      <div class="tool-action-bar">
        <div class="tool-primary-actions">
          <button id="generateResumeBtnGen" class="auth-submit-btn tool-action-btn tool-action-btn--primary" type="button">Generate Resume</button>
        </div>
        <div class="tool-secondary-actions">
          <button id="clearResumeFieldsBtnGen" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Clear Fields</button>
          <button id="saveResumePdfBtnGen" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as PDF</button>
          <button id="saveResumeWordBtnGen" class="auth-submit-btn tool-action-btn tool-action-btn--secondary" type="button">Save as Word</button>
        </div>
      </div>
      <div id="resumeOutputGen" style="margin-top:18px;"></div>
    </div>
  </main>
  <footer class="site-footer">
    &copy; 2026 RoleRocket AI &nbsp;&middot;&nbsp;
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="refund-policy.html">Refund Policy</a>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/quickstart-progress.js"></script>
  <script src="js/resume-generator-gen.js"></script>
  <script src="js/return-navigation.js"></script>
</body>
</html>
