<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Generator | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="hero">
    <h1>Resume Generator</h1>
    <p>Generate a tailored resume for your target job in seconds.</p>
  </div>
  <main id="main" class="main" tabindex="-1">
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 18px 0;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
    <div class="card" style="max-width:600px;margin:auto;">
      <label for="resumeJobTitleGen"><strong>Target Job Title</strong></label>
      <input id="resumeJobTitleGen" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Data Scientist" />
      <label for="resumeCompanyGen"><strong>Company</strong></label>
      <input id="resumeCompanyGen" type="text" style="width:100%;margin-bottom:10px;" placeholder="e.g. Acme Corp" />
      <label for="resumeBaseGen"><strong>Your Baseline Resume (paste or upload)</strong></label>
      <textarea id="resumeBaseGen" rows="6" style="width:100%;margin-bottom:10px;" placeholder="Paste your baseline resume here..."></textarea>
      <button id="generateResumeBtnGen" class="auth-submit-btn" style="margin-bottom:10px;">Generate Resume</button>
      <button id="downloadResumePdfBtnGen" class="auth-submit-btn" style="width:100%;margin-top:10px;background:#f59e42;color:#1e293b;display:none;">Download as PDF</button>
      <button id="saveResumeBtnGen" class="auth-submit-btn" style="width:100%;margin-top:10px;background:#38bdf8;color:#1e293b;">Save Resume</button>
      <div id="resumeOutputGen" style="margin-top:18px;"></div>
    </div>
  </main>
  <main id="main" class="main" tabindex="-1">
    <div class="card" style="max-width:600px;margin:auto;">

      <button id="generateResumeBtnGen" class="auth-submit-btn" style="margin-bottom:10px;">Generate Resume</button>
      <button id="downloadResumePdfBtnGen" class="auth-submit-btn" style="width:100%;margin-top:10px;background:#f59e42;color:#1e293b;display:none;">Download as PDF</button>
      <button id="saveResumeBtnGen" class="auth-submit-btn" style="width:100%;margin-top:10px;background:#38bdf8;color:#1e293b;">Save Resume</button>
      <div id="resumeOutputGen" style="margin-top:18px;"></div>
    </div>
