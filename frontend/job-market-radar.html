<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Market Radar | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/jspdf-loader.js"></script>
  <script src="js/api-base.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <div class="hero contact-hero">
    <h1 class="home-brand-title"><span class="home-brand-rocket" aria-hidden="true">🚀</span><span>RoleRocket AI</span></h1>
    <p class="home-brand-subtitle">Job Market Radar</p>
  </div>
  <div class="layout">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="sidebar-link-btn" href="index.html">Home</a>
      <a class="sidebar-link-btn" href="features.html">Features</a>
      <a class="sidebar-link-btn" href="dashboard.html">My Dashboard</a>
    </aside>
    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature pro" style="max-width:700px;margin:0 auto 32px auto;text-align:center;">
        <h2 class="feature-title">Job Market Radar</h2>
        <p>See trending roles, in-demand skills, and market insights tailored to your profile.</p>
        <div style="max-width:600px;margin:18px auto;text-align:left;">
          <label for="marketRadarRoleInput" style="display:block;margin-bottom:10px;">Target Role<br /><input id="marketRadarRoleInput" style="width:100%;margin-top:6px;" placeholder="Example: Product Manager" /></label>
          <label for="marketRadarLocationInput" style="display:block;margin-bottom:10px;">Preferred Location<br /><input id="marketRadarLocationInput" style="width:100%;margin-top:6px;" placeholder="Example: Remote or Chicago" /></label>
          <div style="text-align:center;">
            <button id="generateMarketRadarBtn" class="feature-launch-btn" type="button">Generate Market Radar</button>
          </div>
        </div>
        <div id="marketRadarResult" style="display:none;">
          <textarea id="marketRadarText" style="width:100%;max-width:600px;height:220px;margin:18px 0;"></textarea>
          <div id="marketRadarDownloads" style="display:none;margin:18px 0;">
            <button id="downloadMarketRadarPdfBtn" class="feature-launch-btn" style="margin-right:12px;">Download as PDF</button>
            <button id="downloadMarketRadarWordBtn" class="feature-launch-btn">Download as Word</button>
          </div>
        </div>
        <div id="marketRadarOutput"></div>
      </section>
    </main>
  </div>
  <script src="js/job-market-radar.js"></script>
</body>
</html>
