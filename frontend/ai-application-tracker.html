<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Application Tracker | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/jspdf-loader.js"></script>
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <div class="hero contact-hero">
    <h1 class="home-brand-title"><span class="home-brand-rocket" aria-hidden="true">🚀</span><span>RoleRocket AI</span></h1>
    <p class="home-brand-subtitle">AI Application Tracker</p>
  </div>
  <div class="layout">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="sidebar-link-btn" href="index.html">Home</a>
      <a class="sidebar-link-btn" href="features.html">Features</a>
      <a class="sidebar-link-btn" href="dashboard.html">My Dashboard</a>
    </aside>
    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature elite" style="max-width:700px;margin:0 auto 32px auto;text-align:center;">
        <h2 class="feature-title">AI Application Tracker</h2>
        <p>Track all your applications, interviews, and offers in one place with AI insights.</p>
        <div style="display:grid;gap:12px;text-align:left;max-width:620px;margin:20px auto;">
          <label for="trackerApplicationsInput"><strong>Applications</strong></label>
          <textarea id="trackerApplicationsInput" style="width:100%;height:150px;" placeholder="Add one application per line, for example: Stripe | Product Manager | Interview Scheduled"></textarea>
          <label for="trackerFocusInput"><strong>Current Focus</strong></label>
          <input id="trackerFocusInput" type="text" style="width:100%;" placeholder="e.g. Improve response rate and prepare for onsite interviews" />
        </div>
        <div style="margin:18px 0;">
          <button id="generateApplicationTrackerBtn" class="feature-launch-btn">Generate Tracker Summary</button>
        </div>
        <div id="applicationTrackerResult" style="display:none;">
          <textarea id="applicationTrackerText" readonly style="width:100%;max-width:600px;height:220px;margin:18px 0;"></textarea>
        </div>
        <div id="applicationTrackerDownloads" style="display:none;margin:18px 0;">
          <button id="downloadApplicationTrackerPdfBtn" class="feature-launch-btn" style="margin-right:12px;">Download as PDF</button>
          <button id="downloadApplicationTrackerWordBtn" class="feature-launch-btn">Download as Word</button>
        </div>
        <div id="applicationTrackerOutput"></div>
      </section>
    </main>
  </div>
  <script src="js/ai-application-tracker.js"></script>
</body>
</html>
