<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Assist | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
    <h1>Interview Assist</h1>
    <p>Practice live interview calls with AI and get instant feedback and improvement pointers after each session.</p>
  </div>
  <div class="card" style="max-width:540px;margin:32px auto;">
    <label for="interviewRole"><strong>Role Title</strong></label>
    <input id="interviewRole" type="text" style="width:100%;margin-bottom:12px;" placeholder="e.g. Software Engineer" />
    <label for="interviewScenario"><strong>Interview Scenario (optional)</strong></label>
    <textarea id="interviewScenario" rows="4" style="width:100%;margin-bottom:12px;" placeholder="Describe the scenario or focus area..."></textarea>
    <button id="startInterviewBtn" class="auth-submit-btn" style="width:100%;">Start Interview</button>
    <button id="startAudioBtn" class="auth-submit-btn" style="width:100%;margin-top:10px;">Start Audio Practice</button>
    <audio id="localAudio" style="display:none;" controls></audio>
    <div id="interviewAssistResult" style="margin-top:18px;min-height:80px;"></div>
  </div>
  <script src="js/api-base.js"></script>
  <script src="js/auth-storage.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/ai-interview-audio.js"></script>
  <script src="js/ai-interview-assist.js"></script>
</body>
</html>
