    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature elite" style="max-width:1120px;width:min(1120px, calc(100vw - 64px));margin:32px auto;text-align:center;">
        <h2 class="feature-title">AI Job Agent</h2>
        <p>Let AI scout and recommend jobs for you, tailored to your goals and preferences.</p>
        <div style="width:100%;max-width:1000px;margin:18px auto;text-align:left;">
          <label for="jobAgentRoleInput" style="display:block;margin-bottom:10px;">Target Role<br /><input id="jobAgentRoleInput" style="width:100%;margin-top:6px;" placeholder="Example: Product Manager" /></label>
          <label for="jobAgentLocationInput" style="display:block;margin-bottom:10px;">Preferred Location<br /><input id="jobAgentLocationInput" style="width:100%;margin-top:6px;" placeholder="Example: Remote or New York" /></label>
          <label for="jobAgentPreferencesInput" style="display:block;margin-bottom:10px;">Preferences<br /><textarea id="jobAgentPreferencesInput" style="width:100%;height:90px;margin-top:6px;" placeholder="Example: B2B SaaS, growth-stage company, strong product analytics culture"></textarea></label>
          <div style="text-align:center;">
            <button id="generateJobAgentBtn" class="feature-launch-btn" type="button">Scout Jobs For Me</button>
          </div>
        </div>
        <div id="jobAgentResult" style="display:none;">
          <textarea id="jobAgentText" style="width:100%;height:220px;margin:18px 0;"></textarea>
          <div id="jobAgentMatches" style="text-align:left;width:100%;margin:0 auto 18px auto;"></div>
          <div id="jobAgentDownloads" style="display:none;margin:18px 0;">
          <button id="downloadJobAgentPdfBtn" class="feature-launch-btn" style="margin-right:12px;">Download as PDF</button>
          <button id="downloadJobAgentWordBtn" class="feature-launch-btn">Download as Word</button>
          </div>
        </div>
        <div id="jobAgentOutput"></div>
      </section>
