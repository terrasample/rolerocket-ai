<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamification | RoleRocket AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <div class="hero contact-hero">
    <h1 class="home-brand-title"><span class="home-brand-rocket" aria-hidden="true">🚀</span><span>RoleRocket AI</span></h1>
    <p class="home-brand-subtitle">Gamification</p>
  </div>
  <div class="layout">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="sidebar-link-btn" href="index.html">Home</a>
      <a class="sidebar-link-btn" href="features.html">Features</a>
      <a class="sidebar-link-btn" href="dashboard.html">My Dashboard</a>
    </aside>
    <main class="main marketing-main" id="mainContent" tabindex="-1">
      <button onclick="window.history.back()" class="back-arrow-btn" aria-label="Go back" style="margin:12px 0 0 12px;background:none;border:none;cursor:pointer;font-size:1.6em;color:#2563eb;"><span aria-hidden="true">&#8592;</span> Back</button>
      <section class="marketing-card tier-feature pro" style="max-width:860px;margin:0 auto 32px auto;">
        <h2 class="feature-title" style="text-align:center;">Gamified Progress</h2>
        <p style="text-align:center;">Track momentum, earn badges, and keep your job search moving with visible progress.</p>
        <div class="marketing-grid" style="margin-top:18px;">
          <article class="marketing-card tier-feature premium">
            <h3>Total Points</h3>
            <div id="gamePoints" style="font-size:2rem;font-weight:700;">0</div>
          </article>
          <article class="marketing-card tier-feature elite">
            <h3>Current Streak</h3>
            <div id="gameStreak" style="font-size:2rem;font-weight:700;">0 days</div>
          </article>
          <article class="marketing-card tier-feature pro">
            <h3>Level</h3>
            <div id="gameLevel" style="font-size:2rem;font-weight:700;">Rookie</div>
          </article>
        </div>

        <div class="marketing-grid" style="margin-top:18px;">
          <article class="marketing-card tier-feature pro">
            <h3>Log Progress</h3>
            <div style="display:grid;gap:10px;">
              <button class="feature-launch-btn game-action-btn" data-action="application">+ Job Application</button>
              <button class="feature-launch-btn game-action-btn" data-action="interview">+ Interview Prep Session</button>
              <button class="feature-launch-btn game-action-btn" data-action="networking">+ Networking Outreach</button>
              <button class="feature-launch-btn game-action-btn" data-action="skill">+ Skill Sprint</button>
            </div>
          </article>
          <article class="marketing-card tier-feature premium">
            <h3>Badges</h3>
            <ul id="gameBadges"></ul>
          </article>
          <article class="marketing-card tier-feature elite">
            <h3>Recent Activity</h3>
            <ul id="gameHistory"></ul>
          </article>
        </div>

        <div style="text-align:center;margin-top:18px;">
          <button id="resetGamificationBtn" class="feature-launch-btn" type="button">Reset Progress</button>
        </div>
        <div id="gamificationOutput" style="text-align:center;margin-top:14px;"></div>
      </section>
    </main>
  </div>
  <script src="js/gamification.js"></script>
</body>
</html>
